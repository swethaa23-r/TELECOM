<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Stackly Telecom</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.min.css">
    <link rel="stylesheet" href="assets/css/animations.min.css">
    
    <style>
        /* Animated Telecom Background */
        .auth-bg {
            background: linear-gradient(-45deg, #0a1128, #1f2937, #e50914, #0a1128);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .auth-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/connected.png');
            opacity: 0.4;
            z-index: 0;
        }
        
        .auth-card {
            max-width: 550px; /* Slightly wider for signup */
            width: 100%;
            z-index: 1;
            position: relative;
        }
        
        /* Floating Back Button */
        .back-btn-floating {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 16px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn-floating:hover {
            background: rgba(255,255,255,0.2);
            color: white;
            transform: translateX(-5px);
        }

        /* Focus Effects */
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(229, 9, 20, 0.25) !important;
            border-color: var(--primary-red) !important;
        }
        .input-group-text {
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }
        .form-control:focus + .input-group-text, 
        .form-control:focus ~ .input-group-text,
        .input-group:focus-within .input-group-text {
            border-color: var(--primary-red) !important;
            color: var(--primary-red) !important;
        }
        
        /* Password Toggle */
        .toggle-password {
            cursor: pointer;
            z-index: 5;
        }
        .toggle-password:hover {
            color: var(--primary-red) !important;
        }
        
        /* Hide default browser eye icon */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>
<body class="auth-bg d-flex align-items-center justify-content-center">
    <a href="index.html" class="back-btn-floating"><i class="fa-solid fa-arrow-left me-2"></i> Back to Home</a>

    <div class="container py-5 d-flex justify-content-center">
        <div class="auth-card" data-aos="zoom-in">
            <!-- Back to Home -->
            
            <div class="premium-card bg-white p-5 text-center shadow-lg position-relative overflow-hidden">
                <!-- Decorative element -->
                <div class="position-absolute top-0 end-0 bg-primary-custom" style="width: 100px; height: 100px; border-radius: 50%; transform: translate(50%, -50%); opacity: 0.1;"></div>
                
                <div class="mb-4">
                    <a class="navbar-brand d-inline-block mb-3" href="index.html">
                        <img src="redlogo.webp" alt="Stackly Logo" height="30" width="109" class="me-2 d-inline-block align-text-top">
                    </a>
                    <h4 class="fw-bold text-dark-navy">Create Account</h4>
                    <p class="text-muted small">Join India's fastest growing 5G network.</p>
                </div>
                
                <form id="signupForm" class="needs-validation text-start" novalidate>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Select Role</label>
                        <select class="form-select bg-light border-0 py-2" id="signupRole" required>
                            <option value="customer" selected>Customer</option>
                            <option value="admin">Administrator</option>
                            <option value="support">Support Executive</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="John Doe" required>
                            <div class="invalid-feedback">Please enter your full name.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" placeholder="name@example.com" required>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Mobile Number</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-phone text-muted"></i></span>
                            <input type="tel" class="form-control border-start-0 ps-0" placeholder="10 digit number" pattern="[0-9]{10}" required>
                            <div class="invalid-feedback">Please enter a valid 10-digit mobile number.</div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label small fw-bold text-secondary">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 border-end-0 px-0" id="signupPassword" placeholder="••••••••" required minlength="8">
                                <span class="input-group-text bg-light border-start-0 toggle-password" onclick="toggleVisibility('signupPassword', this)"><i class="fa-regular fa-eye text-muted"></i></span>
                                <div class="invalid-feedback">Min 8 characters.</div>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small fw-bold text-secondary">Confirm</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0 border-end-0 px-0" id="signupConfirmPassword" placeholder="••••••••" required>
                                <span class="input-group-text bg-light border-start-0 toggle-password" onclick="toggleVisibility('signupConfirmPassword', this)"><i class="fa-regular fa-eye text-muted"></i></span>
                                <div class="invalid-feedback" id="confirmFeedback">Passwords must match.</div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 ripple mb-4">Create Account</button>
                    
                    <div class="text-center">
                        <span class="text-muted small">Already have an account? </span>
                        <a href="login.html" class="text-primary-custom text-decoration-none fw-bold small">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JS Libraries -->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/forms.min.js"></script>
    <!-- Animation Libraries -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/animations.min.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        
        // Toggle Password Visibility
        function toggleVisibility(inputId, iconSpan) {
            const input = document.getElementById(inputId);
            const icon = iconSpan.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Custom validation for password matching
        const password = document.getElementById("signupPassword");
        const confirm_password = document.getElementById("signupConfirmPassword");

        function validatePassword(){
            if(password.value != confirm_password.value) {
                confirm_password.setCustomValidity("Passwords Don't Match");
            } else {
                confirm_password.setCustomValidity('');
            }
        }
        
        if (password && confirm_password) {
            password.onchange = validatePassword;
            confirm_password.onkeyup = validatePassword;
        }

        // Handle Form Validation & Redirection
        const signupForm = document.getElementById('signupForm');
        if(signupForm) {
            signupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                validatePassword(); // Final check
                
                if (!this.checkValidity()) {
                    e.stopPropagation();
                    signupForm.classList.add('was-validated');
                    // Shake animation
                    gsap.fromTo(signupForm, 
                        { x: -10 },
                        { x: 10, duration: 0.1, yoyo: true, repeat: 3, onComplete: () => { gsap.set(signupForm, {x: 0}) } }
                    );
                } else {
                    // Valid
                    const btn = this.querySelector('button[type="submit"]');
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Creating Account...';
                    btn.disabled = true;
                    
                    setTimeout(() => {
                        alert("Account created successfully");
                        window.location.href = "login.html";
                    }, 1500);
                }
            }, false);
        }
    </script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var navbarCollapse = document.getElementById('navbarNav');
        if (navbarCollapse) {
            navbarCollapse.addEventListener('show.bs.collapse', function () {
                document.body.classList.add('no-scroll');
            });
            navbarCollapse.addEventListener('hidden.bs.collapse', function () {
                document.body.classList.remove('no-scroll');
            });
            
            // Close mobile menu on link click
            var navLinks = navbarCollapse.querySelectorAll('.nav-link');
            navLinks.forEach(function(link) {
                link.addEventListener('click', function() {
                    if (window.getComputedStyle(document.querySelector('.navbar-toggler')).display !== 'none') {
                        var bsCollapse = bootstrap.Collapse.getInstance(navbarCollapse);
                        if (bsCollapse) bsCollapse.hide();
                    }
                });
            });
        }
    });
</script>
    
</body>
</html>

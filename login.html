<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly Telecom</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.min.css">
    <link rel="stylesheet" href="assets/css/animations.min.css">
    
    <style>
        /* Animated Telecom Background */
        .auth-bg {
            background: linear-gradient(-45deg, #0a1128, #1f2937, #e50914, #0a1128);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .auth-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/connected.png');
            opacity: 0.4;
            z-index: 0;
        }
        
        .auth-card {
            max-width: 450px;
            width: 100%;
            z-index: 1;
            position: relative;
        }
        
        /* Floating Back Button */
        .back-btn-floating {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 8px 16px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn-floating:hover {
            background: rgba(255,255,255,0.2);
            color: white;
            transform: translateX(-5px);
        }

        /* Focus Effects */
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.25rem rgba(229, 9, 20, 0.25) !important;
            border-color: var(--primary-red) !important;
        }
        .input-group-text {
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }
        .form-control:focus + .input-group-text, 
        .form-control:focus ~ .input-group-text,
        .input-group:focus-within .input-group-text {
            border-color: var(--primary-red) !important;
            color: var(--primary-red) !important;
        }
        
        /* Password Toggle */
        .toggle-password {
            cursor: pointer;
            z-index: 5;
        }
        .toggle-password:hover {
            color: var(--primary-red) !important;
        }
        
        /* Hide default browser eye icon */
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>
<body class="auth-bg d-flex align-items-center justify-content-center">
    <a href="index.html" class="back-btn-floating"><i class="fa-solid fa-arrow-left me-2"></i> Back to Home</a>

    <div class="container py-5 d-flex justify-content-center">
        <div class="auth-card" data-aos="zoom-in">
            <div class="premium-card bg-white p-5 text-center shadow-lg position-relative overflow-hidden">
                <!-- Decorative element -->
                <div class="position-absolute top-0 end-0 bg-primary-custom" style="width: 100px; height: 100px; border-radius: 50%; transform: translate(50%, -50%); opacity: 0.1;"></div>
                
                <div class="mb-4">
                    <a class="navbar-brand d-inline-block mb-3" href="index.html">
                        <img loading="lazy" src="redlogo.webp" alt="Stackly Logo" height="30" width="109" class="me-2 d-inline-block align-text-top">
                    </a>
                    <h4 class="fw-bold text-dark-navy">Welcome Back</h4>
                    <p class="text-muted small">Sign in to manage your account and services.</p>
                </div>
                
                <form id="loginForm" class="needs-validation text-start" novalidate>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Select Role</label>
                        <select class="form-select bg-light border-0 py-2" id="loginRole" required>
                            <option value="" disabled selected>Select Role</option>
                            <option value="customer">Customer</option>
                            <option value="admin">Administrator</option>
                            <option value="support-team">Support Executive</option>
                        </select>
                        <div class="invalid-feedback">Please select a role.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="loginName" placeholder="Enter your full name" required minlength="3" pattern="^[A-Za-z\s]{3,}$">
                            <div class="invalid-feedback">Please enter your name.</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-secondary">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="loginEmail" placeholder="name@example.com" required>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label class="form-label small fw-bold text-secondary mb-0">Password</label>
                            <a href="404.html" class="small text-primary-custom text-decoration-none fw-semibold text-nowrap">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0 px-0" id="loginPassword" placeholder="••••••••" required minlength="8" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$">
                            <span class="input-group-text bg-light border-start-0 toggle-password" onclick="toggleVisibility('loginPassword', this)"><i class="fa-regular fa-eye text-muted"></i></span>
                            <div class="invalid-feedback">Password is required (min 8 characters).</div>
                        </div>
                    </div>
                    
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-secondary" for="rememberMe">Remember me for 30 days</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100 py-2 ripple mb-4" data-custom-submit="true">Sign In</button>
                    
                    <div class="text-center">
                        <span class="text-muted small">Don't have an account? </span>
                        <a href="signup.html" class="text-primary-custom text-decoration-none fw-bold small">Create Account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JS Libraries -->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/forms.min.js"></script>
    <!-- Animation Libraries -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/animations.min.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
        
        // Toggle Password Visibility
        function toggleVisibility(inputId, iconSpan) {
            const input = document.getElementById(inputId);
            const icon = iconSpan.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Handle Form Validation & Redirection
        const loginForm = document.getElementById('loginForm');
        if(loginForm) {
            loginForm.addEventListener('submit', function(e) {
                // Global validation logic (forms.js) handles preventing default if invalid.
                if (this.checkValidity()) {
                    e.preventDefault(); // Prevent actual submission to handle redirect
                    
                    // Valid — Save user data to localStorage
                    const userName = document.getElementById('loginName').value.trim();
                    const userEmail = document.getElementById('loginEmail').value.trim();
                    const role = document.getElementById('loginRole').value;
                    
                    localStorage.setItem('stacklyUserName', userName);
                    localStorage.setItem('stacklyUserEmail', userEmail);
                    localStorage.setItem('stacklyUserRole', role);

                    const btn = this.querySelector('button[type="submit"]');
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Authenticating...';
                    btn.disabled = true;
                    
                    setTimeout(() => {
                        window.location.href = `dashboards/${role}.html`;
                    }, 1500);
                }
            }, false);
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
</body>
</html>

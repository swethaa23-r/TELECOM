<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Signal Lost | Stackly Telecom</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.min.css">
    <link rel="stylesheet" href="assets/css/animations.min.css">
    
    <style>
        .error-bg {
            background: url('https://www.transparenttextures.com/patterns/connected.png'), var(--dark-gradient);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }
        .error-card {
            max-width: 600px;
            width: 100%;
            z-index: 10;
        }
        .floating-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.05);
            animation: float 10s infinite linear;
            z-index: 1;
        }
        .icon-1 { top: 15%; left: 10%; font-size: 3rem; animation-duration: 12s; }
        .icon-2 { top: 75%; left: 15%; font-size: 5rem; animation-duration: 18s; animation-direction: reverse; }
        .icon-3 { top: 25%; right: 10%; font-size: 4rem; animation-duration: 15s; }
        .icon-4 { top: 80%; right: 20%; font-size: 2.5rem; animation-duration: 10s; }
        .icon-5 { top: 50%; left: 5%; font-size: 2rem; animation-duration: 14s; }
        .icon-6 { top: 40%; right: 5%; font-size: 6rem; animation-duration: 20s; animation-direction: reverse; }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }

        .glitch-text {
            font-size: 6rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8), -2px -2px 0px rgba(0,0,0,0.1);
            position: relative;
            display: inline-block;
        }
        .radar-box {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            background: rgba(227, 6, 19, 0.1);
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .radar-box::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(transparent, rgba(227, 6, 19, 0.4));
            animation: radar-spin 2s linear infinite;
        }
        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="error-bg d-flex align-items-center justify-content-center">

    <!-- Floating Background Icons -->
    <i class="fa-solid fa-tower-cell floating-icon icon-1"></i>
    <i class="fa-solid fa-wifi floating-icon icon-2"></i>
    <i class="fa-solid fa-satellite-dish floating-icon icon-3"></i>
    <i class="fa-solid fa-globe floating-icon icon-4"></i>
    <i class="fa-solid fa-mobile-screen floating-icon icon-5"></i>
    <i class="fa-solid fa-sim-card floating-icon icon-6"></i>

    <div class="container py-5 d-flex justify-content-center">
        <div class="error-card text-center" data-aos="zoom-in">
            <div class="premium-card bg-white p-5 shadow-lg position-relative overflow-hidden border-0">
                
                <div class="radar-box shadow-sm mx-auto">
                    <i class="fa-solid fa-satellite text-primary pulse-primary" style="font-size: 3rem; z-index: 2;"></i>
                </div>
                
                <h1 class="glitch-text mb-0">404</h1>
                <h3 class="fw-bold text-dark-navy mt-3">Signal Lost!</h3>
                <p class="text-muted mt-2 mb-4">The page you're trying to reach is out of our coverage area or doesn't exist anymore.</p>
                
                <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-4">
                    <a href="index.html" class="btn btn-primary-custom px-4 py-2 ripple">
                        <i class="fa-solid fa-house me-2"></i> Back Home
                    </a>
                    <a href="support.html" class="btn btn-outline-secondary px-4 py-2">
                        <i class="fa-solid fa-headset me-2"></i> Contact Support
                    </a>
                </div>
            </div>
            
            <div class="mt-4">
                <a class="text-white-50 text-decoration-none hover-text-white d-inline-flex align-items-center" href="index.html">
                    <img loading="lazy" src="redlogo.webp" alt="Stackly Logo" height="30" width="109" class="me-2 d-inline-block align-text-top"> <span class="fw-bold">Stackly Telecom</span>
                </a>
            </div>
        </div>
    </div>

    <!-- JS Libraries -->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
    <!-- Animation Libraries -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/main.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
</body>
</html>
